<!DOCTYPE html>
<html>
<head>
  <title>Payslip Generator</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 400px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #218838;
    }

    .note {
      font-size: 12px;
      text-align: center;
      color: gray;
      margin-top: 10px;
    }
  </style>

</head>

<body>

  <div class="card">
    <h2>PAYSLIP GENERATOR</h2>

    <form action="/generate" method="post">

      <input name="emp_id" placeholder="Employee ID" required>

      <input name="emp_name" placeholder="Employee Name" required>

      <input name="basic" placeholder="Basic Salary" required>

      <input name="allowances" placeholder="Allowances" required>

      <input name="deductions" placeholder="Deductions" required>

      <button type="submit">Generate PDF</button>

    </form>

    <div class="note">
      Click generate to download payslip PDF
    </div>

  </div>

</body>
</html>
